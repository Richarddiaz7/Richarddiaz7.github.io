<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>MyXinema</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,107,107,0.5);
        }
        
        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #FFD700, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        
        .search-input::placeholder {
            color: rgba(255,255,255,0.6);
        }
        
        .search-btn {
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .genres {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .genre-btn {
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        
        .movie-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        
        .movie-title {
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }
        
        /* Reproductor que ocupa TODO */
        .video-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 99999;
            display: none;
        }
        
        .video-player.active {
            display: block;
        }
        
        .video-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .close-video {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 100000;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #FF6B6B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .welcome {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="header">
        <img class="logo" src="https://i.imgur.com/xbwwor3.png" alt="MyXinema">
        <h1>🎬 MyXinema</h1>
        <p>Tu cine personal en Telegram</p>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar película...">
        <button class="search-btn" onclick="searchMovies()">Buscar</button>
    </div>
    
    <div class="genres">
        <button class="genre-btn" onclick="getGenre(28)">🔥 Acción</button>
        <button class="genre-btn" onclick="getGenre(35)">😂 Comedia</button>
        <button class="genre-btn" onclick="getGenre(27)">👻 Terror</button>
        <button class="genre-btn" onclick="getGenre(16)">🧸 Animación</button>
        <button class="genre-btn" onclick="getGenre(878)">🚀 Sci-Fi</button>
        <button class="genre-btn" onclick="getGenre(18)">🎭 Drama</button>
    </div>
    
    <div id="loading" class="loading"><div class="spinner"></div><p>Buscando...</p></div>
    <div id="results" class="movies-grid"></div>
    <div id="welcome" class="welcome"><h2>🍿 ¡Bienvenido!</h2><p>Busca una película o elige un género</p></div>
    
    <div id="videoPlayer" class="video-player">
        <button class="close-video" onclick="closeVideo()">✕ Cerrar</button>
        <iframe id="videoFrame" class="video-frame" allowfullscreen></iframe>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Forzar que la app ocupe todo el espacio disponible
        tg.expand();
        
        const TMDB_API = "d73daaeb037829af157af19c3bc8b1fd";
        
        async function getIMDBId(tmdbId, tipo) {
            try {
                const url = `https://api.themoviedb.org/3/${tipo}/${tmdbId}/external_ids?api_key=${TMDB_API}`;
                const res = await fetch(url);
                const data = await res.json();
                return data.imdb_id || tmdbId;
            } catch(e) {
                return tmdbId;
            }
        }
        
        function hideWelcome() {
            document.getElementById('welcome').style.display = 'none';
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').innerHTML = '';
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        async function playMovie(tmdbId, tipo) {
            const imdbId = await getIMDBId(tmdbId, tipo);
            // Usamos un reproductor alternativo con menos anuncios
            const url = `https://vidsrc.xyz/embed/${tipo}/${imdbId}`;
            const frame = document.getElementById('videoFrame');
            const player = document.getElementById('videoPlayer');
            
            frame.src = url;
            player.classList.add('active');
            
            // Ocultar la interfaz de Telegram para que no moleste
            try {
                tg.MainButton.hide();
                tg.BackButton.hide();
            } catch(e) {}
        }
        
        function closeVideo() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('videoPlayer').classList.remove('active');
        }
        
        async function searchMovies() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            showLoading();
            hideWelcome();
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API}&query=${encodeURIComponent(query)}&language=es-ES`);
                const data = await res.json();
                displayMovies(data.results || []);
            } catch(e) { 
                alert('Error al buscar');
            }
            hideLoading();
        }
        
        async function getGenre(genreId) {
            showLoading();
            hideWelcome();
            try {
                const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API}&with_genres=${genreId}&language=es-ES&sort_by=popularity.desc`);
                const data = await res.json();
                displayMovies(data.results || []);
            } catch(e) { 
                alert('Error al cargar género');
            }
            hideLoading();
        }
        
        function displayMovies(movies) {
            const container = document.getElementById('results');
            if(!movies || movies.length === 0) {
                container.innerHTML = '<p style="text-align:center;">No hay resultados</p>';
                return;
            }
            container.innerHTML = movies.slice(0, 12).map(movie => {
                const title = movie.title || movie.name;
                const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w300${movie.poster_path}` : '';
                const tipo = movie.media_type === 'tv' ? 'tv' : 'movie';
                return `<div class="movie-card" onclick="playMovie(${movie.id}, '${tipo}')">
                            ${poster ? `<img class="movie-poster" src="${poster}">` : '<div class="movie-poster" style="background:#333;"></div>'}
                            <div class="movie-title">${title}</div>
                        </div>`;
            }).join('');
        }
        
        // Ajustar tamaño cuando cambia la orientación
        window.addEventListener('resize', () => {
            tg.expand();
        });
    </script>
</body>
</html>
